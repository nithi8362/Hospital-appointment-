<!DOCTYPE html>
<html>
<head>
    <title>Online Hospital Appointment</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
        }
        input, select, button {
            margin: 10px;
            padding: 10px;
            width: 90%;
        }
        button {
            background-color: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Book Appointment</h2>

        <input type="text" placeholder="Patient Name">
        <input type="number" placeholder="Age">

        <select>
            <option>Select Doctor</option>
            <option>Dr. Ramesh</option>
            <option>Dr. Sita</option>
        </select>

        <input type="date">

        <button onclick="book()">Book</button>
    </div>

    <script>
        function book() {
            alert("Appointment Booked Successfully!");
        }
    </script>
</body>
</html>
